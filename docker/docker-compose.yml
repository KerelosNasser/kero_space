version: '3.8'
services:
  kero-space-api:
    build: ../backend
    ports:
      - "8080:8080"
    depends_on:
      - kero-space-postgres
      - kero-space-redis

  kero-space-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: kero
      POSTGRES_PASSWORD: space_password
      POSTGRES_DB: kero_space
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  kero-space-redis:
    image: redis:7
    ports:
      - "6379:6379"

  kero-space-caddy:
    image: caddy:2
    ports:
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - kero-space-api
